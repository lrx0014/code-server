name: Publish Helm Chart

on:
  push:
    branches:
      - main

# Cancel in-progress runs when developers push additional changes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-helm-chart:
    name: Build and Publish Helm Chart
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: "v3.19.2"

      - name: Create Helm chart artifact directory
        run: |
          mkdir -p ./chart-artifacts

      - name: Package Helm chart
        run: |
          helm package ci/helm-chart -d ./chart-artifacts

      - name: Generate Helm repository index
        run: |
          helm repo index ./chart-artifacts --url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./chart-artifacts

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164dcc165427c6c5c21e86e7711852b8ad # v4
